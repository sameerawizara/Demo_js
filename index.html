<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width ,initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />

    <title>Information</title>
  </head>
  <body>
    <h1>Form</h1>

    <fieldset>
      <label>
        <input
          type="text"
          name="getinput"
          id="getinput"
          placeholder="Name"
          required
          autofocus
        />
      </label>
       <label>
        <input
          type="number"
          name="Mobile"
          id="mobile"
          placeholder="Mobile"
          required
          autofocus
        />
      </label>
      <label>
        <input
          type="text"
          name="Pasword"
          id="password"
          placeholder="Password"
          required
          autofocus
        />
      </label>
      <label>
        <input
          type="text"
          name="email"
          id="email"
          placeholder="email"
          required
          autofocus
        />
      </label>
      <br />
      <button id="Edit" type="Edit" onclick="update()">View1</button>
      <button id="view" type="view" onclick="find()">View2</button>
    </fieldset>

    <br /><br />
    <script src="scripts.js"></script>
  </body>
  <div id="data"></div>
</html>
